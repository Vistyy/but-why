id: process-properties-belong-to-cli-entry
valid:
  - environment.cwd
  - processState.env
invalid:
  - process.env
  - process.stdout.write(output)
  - process.exitCode = 1
  - globalThis.process.env
---
id: effect-tests-use-effect-vitest-runtime
valid:
  - it.effect("executes work", () => Effect.map(work, done))
  - it.scoped("executes scoped work", () => work)
invalid:
  - Effect.runPromise(work)
  - Fx.runPromiseExit(work)
  - Effect.runSync(work)
  - runtime.runSyncExit(work)
  - Effect.runFork(work)
  - Fx.runCallback(work)
---
id: toon-package-belongs-to-output-codec
valid:
  - import { success } from "../cliResults.js";
invalid:
  - import { encode as toonEncode } from "@toon-format/toon";
  - import * as Toon from "@toon-format/toon";
  - import("@toon-format/toon")
  - require("@toon-format/toon")
---
id: sandcastle-factories-belong-to-workspace
valid:
  - import type { Sandbox } from "@ai-hero/sandcastle";
  - import { pi, type Sandbox } from "@ai-hero/sandcastle";
  - createValidationWorkspace(input)
invalid:
  - import { createSandbox as makeSandbox } from "@ai-hero/sandcastle";
  - import { noSandbox as none } from "@ai-hero/sandcastle/sandboxes/no-sandbox";
  - import * as Sandcastle from "@ai-hero/sandcastle";
  - import Sandcastle from "@ai-hero/sandcastle";
  - import("@ai-hero/sandcastle")
  - require("@ai-hero/sandcastle")
---
id: task-identity-branding-belongs-to-task-id
valid:
  - storedPublicTaskId(value)
  - value satisfies PublicTaskId
invalid:
  - value as PublicTaskId
  - value as TaskSlug
---
id: wall-clock-belongs-to-cli-entry
valid:
  - new Date(value)
  - clock.now()
invalid:
  - new Date()
  - Date.now()
  - new globalThis.Date()
  - globalThis.Date.now()
  - Date["now"]()
  - globalThis.Date["now"]()
