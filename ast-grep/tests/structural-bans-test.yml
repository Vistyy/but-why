id: no-direct-sqlite-construction
valid:
  - openSqliteTaskStore(input)
invalid:
  - new DatabaseSync(path)
---
id: no-raw-sql-outside-state
valid:
  - sandbox.exec("git rev-parse HEAD")
  - database.prepare(statement)
invalid:
  - database.prepare("SELECT id FROM tasks")
  - |
    database.exec(`
      PRAGMA user_version
    `)
---
id: no-sqlite-row-type-guards
valid:
  - const rowToTask = (row) => row
  - const isTaskState = (value) => value === "todo"
invalid:
  - const isTaskRow = (value) => true
  - function isRunRecordRow(value) { return true }
---
id: no-process-globals-outside-main
valid:
  - environment.cwd
invalid:
  - process.env
  - process.stdout.write(output)
  - process.exitCode = 1
---
id: no-process-import-outside-main
valid:
  - import { spawnSync } from "node:child_process";
invalid:
  - import process from "node:process";
---
id: no-effect-runtime-outside-main
valid:
  - Effect.map(work, done)
invalid:
  - Effect.runPromise(work)
  - Fx.runPromise(work)
---
id: no-effect-runner-import-outside-main
valid:
  - import { Effect } from "effect";
invalid:
  - import { runPromise as run } from "effect/Effect";
  - import * as Fx from "effect/Effect";
---
id: no-serialize-output-outside-main
valid:
  - renderOutput(value)
invalid:
  - serializeOutput(stdout, "toon")
---
id: no-serialize-output-import-outside-main
valid:
  - import { success } from "../cliResults.js";
invalid:
  - import { serializeOutput as serialize } from "./output/serialize.js";
---
id: no-output-format-encoder-outside-serialize
valid:
  - renderOutput(value)
invalid:
  - encodeJson(value)
  - encodeToon(value)
---
id: no-output-format-encoder-import-outside-serialize
valid:
  - import { success } from "../cliResults.js";
invalid:
  - import { encodeJson as json } from "./output/json.js";
  - import { encodeToon as toon } from "./output/toon.js";
---
id: no-toon-encode-import-outside-output-toon
valid:
  - import { success } from "../cliResults.js";
invalid:
  - import { encode as toonEncode } from "@toon-format/toon";
---
id: no-sandcastle-factory-outside-workspace
valid:
  - createValidationWorkspace(input)
invalid:
  - createSandbox({})
  - noSandbox()
  - Sandcastle.createSandbox({})
---
id: no-sandcastle-factory-import-outside-workspace
valid:
  - import type { Sandbox } from "@ai-hero/sandcastle";
invalid:
  - import { createSandbox as makeSandbox } from "@ai-hero/sandcastle";
  - import { noSandbox as none } from "@ai-hero/sandcastle/sandboxes/no-sandbox";
  - import * as Sandcastle from "@ai-hero/sandcastle";
---
id: no-child-process-outside-adapters
valid:
  - runGit(args)
invalid:
  - spawnSync("git", ["status"])
  - execFile("gh", args)
---
id: no-child-process-import-outside-adapters
valid:
  - import process from "node:process";
invalid:
  - import { spawnSync as run } from "node:child_process";
  - import { exec } from "child_process";
---
id: no-inline-task-state-unions
valid:
  - type Single = "todo";
  - const help = "todo ready done";
invalid:
  - type Bad = "todo" | "done";
---
id: no-raw-task-id-parsing-outside-seams
valid:
  - storedPublicTaskId(row.id)
invalid:
  - parsePublicTaskId(value)
  - publicTaskId("BY-1")
  - hasPublicTaskIdShape(value)
---
id: no-task-id-prefix-helper-outside-seams
valid:
  - resolveRepoTaskId(context, taskId)
invalid:
  - const isPublicTaskIdForPrefix = (taskId, taskPrefix) => true
  - function exampleTaskId(taskPrefix) { return `${taskPrefix}-1`; }
---
id: no-branded-task-identity-casts-outside-task-id
valid:
  - storedPublicTaskId(value)
invalid:
  - value as PublicTaskId
  - value as TaskSlug
---
id: no-raw-task-id-operational-names
valid:
  - const message = `Submit ${taskId} when ready`;
  - const runId = `${taskSlugForId(input.taskId)}.${taskRunNumber}`;
invalid:
  - const branchName = `feature/${taskId}`;
  - const refName = "refs/tasks/" + input.taskId;
  - const artifactPath = taskId;
  - const worktreePath = path.join(root, task.id);
  - branch(input.taskId);
  - 'const options = { branchName: `feature/${taskId}` };'
  - 'const run = { runName: input.taskId };'
  - runName = `run-${task.id}`;
  - branchName = task.id;
---
id: no-fs-mutation-outside-init-config
valid:
  - ensureConfig(path)
invalid:
  - writeFileSync(path, content)
  - mkdir(path)
---
id: no-destructive-fs-apis
valid:
  - existsSync(path)
invalid:
  - 'rmSync(path, { recursive: true })'
  - rename(oldPath, newPath)
---
id: no-raw-file-content-read-outside-seams
valid:
  - readDescriptionFile(cwd, file)
invalid:
  - readFileSync(path, "utf8")
  - createReadStream(path)
---
id: no-raw-file-stat-outside-seams
valid:
  - validateTaskFile(path)
invalid:
  - statSync(path)
  - stat(path)
---
id: no-fs-bypass-imports
valid:
  - import { existsSync } from "node:fs";
  - import { readFileSync } from "node:fs";
invalid:
  - import * as fs from "node:fs";
  - import fs from "fs";
  - import { readFileSync as read } from "node:fs";
  - const fs = require("fs/promises")
  - import("node:fs/promises")
---
id: no-json-parse-outside-seams
valid:
  - decodeJson(value)
invalid:
  - JSON.parse(value)
---
id: no-json-stringify-outside-seams
valid:
  - encodeJson(value)
invalid:
  - JSON.stringify(value)
---
id: no-wall-clock-outside-main
valid:
  - new Date(value)
  - now()
invalid:
  - new Date()
  - Date.now()
---
id: no-effect-runtime-in-tests
valid:
  - it.effect("executes work", () => Effect.map(work, done))
  - it.scoped("executes scoped work", () => work)
invalid:
  - Effect.runPromise(work)
  - Fx.runPromiseExit(work)
  - Effect.runSync(work)
  - Fx.runSyncExit(work)
  - Effect.runFork(work)
  - Fx.runCallback(work)
---
id: no-effect-runner-import-in-tests
valid:
  - import { Effect } from "effect"
invalid:
  - import { runPromise } from "effect/Effect"
  - import * as Fx from "effect/Effect"
  - import Effect from "effect/Effect"
