id: process-properties-belong-to-cli-entry
language: TypeScript
severity: error
message: Direct process property access belongs in src/main.ts; other modules receive CLI environment values.
files:
  - src/**/*.ts
ignores:
  - src/main.ts
rule:
  any:
    - pattern: process.$PROPERTY
    - pattern: globalThis.process.$PROPERTY
---
id: runtime-methods-belong-to-runtime-seams
language: TypeScript
severity: error
message: Calls to runPromise, runSync, or related runtime-style methods belong in an approved runtime seam.
files:
  - src/**/*.ts
ignores:
  - src/main.ts
  - src/init/stateDatabase.ts
rule:
  any:
    - pattern: $RUNTIME.runPromise($$$ARGS)
    - pattern: $RUNTIME.runPromiseExit($$$ARGS)
    - pattern: $RUNTIME.runSync($$$ARGS)
    - pattern: $RUNTIME.runSyncExit($$$ARGS)
    - pattern: $RUNTIME.runFork($$$ARGS)
    - pattern: $RUNTIME.runCallback($$$ARGS)
---
id: effect-tests-use-effect-vitest-runtime
language: TypeScript
severity: error
message: Calls to runPromise, runSync, or related runtime-style methods bypass @effect/vitest execution.
files:
  - test/**/*.ts
rule:
  any:
    - pattern: $RUNTIME.runPromise($$$ARGS)
    - pattern: $RUNTIME.runPromiseExit($$$ARGS)
    - pattern: $RUNTIME.runSync($$$ARGS)
    - pattern: $RUNTIME.runSyncExit($$$ARGS)
    - pattern: $RUNTIME.runFork($$$ARGS)
    - pattern: $RUNTIME.runCallback($$$ARGS)
---
id: toon-package-belongs-to-output-codec
language: TypeScript
severity: error
message: Load @toon-format/toon only in src/output/toon.ts.
files:
  - src/**/*.ts
ignores:
  - src/output/toon.ts
rule:
  any:
    - all:
        - kind: import_statement
        - regex: '[\s\S]*["`]@toon-format/toon["`][\s\S]*'
    - pattern: import("@toon-format/toon")
    - pattern: require("@toon-format/toon")
---
id: sandcastle-factories-belong-to-workspace
language: TypeScript
severity: error
message: Load Sandcastle workspace factories only in src/validation/createValidationWorkspace.ts.
files:
  - src/**/*.ts
ignores:
  - src/validation/createValidationWorkspace.ts
rule:
  any:
    - all:
        - kind: import_statement
        - regex: '[\s\S]*(createSandbox|noSandbox)[\s\S]*from\s+["`]@ai-hero/sandcastle([^"`]*)?["`][\s\S]*'
    - all:
        - kind: import_statement
        - regex: '[\s\S]*import\s+(\*\s+as\s+|[A-Za-z_$][A-Za-z0-9_$]*\s+from\s+)[\s\S]*["`]@ai-hero/sandcastle([^"`]*)?["`][\s\S]*'
    - all:
        - kind: call_expression
        - regex: '^(import|require)\(["`]@ai-hero/sandcastle([^"`]*)?["`]\)$'
---
id: child-process-belongs-to-command-adapters
language: TypeScript
severity: error
message: Load child_process only in command adapter modules.
files:
  - src/**/*.ts
ignores:
  - src/init/git.ts
  - src/changeCandidateCapture/localGitCandidate.ts
  - src/submissionEnvironment/gitFacts.ts
  - src/submissionEnvironment/githubTarget.ts
  - src/validation/validationGitGlue.ts
  - src/change/changeStartGit.ts
  - src/change/localChangeCleanupGit.ts
  - src/repositoryPreparation/localRepositoryPreparation.ts
  - src/publication/localCandidatePublicationGit.ts
  - src/submissionEnvironment/localGitHubPullRequestGateway.ts
  - src/change/herdrInteractiveSessionHost.ts
rule:
  any:
    - all:
        - kind: import_statement
        - regex: '[\s\S]*["`](node:child_process|child_process)["`][\s\S]*'
    - pattern: import("node:child_process")
    - pattern: import("child_process")
    - pattern: require("node:child_process")
    - pattern: require("child_process")
---
id: task-identity-branding-belongs-to-task-id
language: TypeScript
severity: error
message: Direct Task identity branding casts belong in src/task/taskId.ts.
files:
  - src/**/*.ts
ignores:
  - src/task/taskId.ts
rule:
  any:
    - pattern: $VALUE as PublicTaskId
    - pattern: $VALUE as TaskSlug
---
id: json-parse-belongs-to-codecs
language: TypeScript
severity: error
message: Direct JSON.parse calls belong in approved configuration, external-tool, or persistence codecs.
files:
  - src/**/*.ts
ignores:
  - src/init/repoConfig.ts
  - src/agent/reviewerOutputWire.ts
  - src/submissionEnvironment/githubTarget.ts
  - src/sqlite/sqliteCandidateValidationPolicy.ts
  - src/sqlite/sqliteTaskContextSnapshot.ts
  - src/sqlite/sqliteChangePreparation.ts
  - src/submissionEnvironment/localGitHubPullRequestGateway.ts
  - src/change/herdrInteractiveSessionHost.ts
rule:
  any:
    - pattern: JSON.parse($$$ARGS)
    - pattern: globalThis.JSON.parse($$$ARGS)
    - pattern: JSON["parse"]($$$ARGS)
    - pattern: globalThis.JSON["parse"]($$$ARGS)
---
id: json-stringify-belongs-to-codecs
language: TypeScript
severity: error
message: Direct JSON.stringify calls belong in approved configuration, output, or persistence codecs.
files:
  - src/**/*.ts
ignores:
  - src/init/repoConfig.ts
  - src/agent/reviewerOutputWire.ts
  - src/output/json.ts
  - src/sqlite/sqliteCandidateValidationPolicy.ts
  - src/sqlite/sqliteTaskContextSnapshot.ts
  - src/sqlite/sqliteChangePreparation.ts
rule:
  any:
    - pattern: JSON.stringify($$$ARGS)
    - pattern: globalThis.JSON.stringify($$$ARGS)
    - pattern: JSON["stringify"]($$$ARGS)
    - pattern: globalThis.JSON["stringify"]($$$ARGS)
---
id: wall-clock-belongs-to-cli-entry
language: TypeScript
severity: error
message: Direct wall-clock reads belong in src/main.ts; other modules receive timestamps.
files:
  - src/**/*.ts
ignores:
  - src/main.ts
rule:
  any:
    - pattern: new Date()
    - pattern: Date.now()
    - pattern: new globalThis.Date()
    - pattern: globalThis.Date.now()
    - pattern: Date["now"]()
    - pattern: globalThis.Date["now"]()
