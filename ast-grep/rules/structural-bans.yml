id: process-properties-belong-to-cli-entry
language: TypeScript
severity: error
message: Direct process property access belongs in src/main.ts; other modules receive CLI environment values.
files:
  - src/**/*.ts
ignores:
  - src/main.ts
rule:
  any:
    - pattern: process.$PROPERTY
    - pattern: globalThis.process.$PROPERTY
---
id: effect-tests-use-effect-vitest-runtime
language: TypeScript
severity: error
message: Calls to runPromise, runSync, or related runtime-style methods bypass @effect/vitest execution.
files:
  - test/**/*.ts
rule:
  any:
    - pattern: $RUNTIME.runPromise($$$ARGS)
    - pattern: $RUNTIME.runPromiseExit($$$ARGS)
    - pattern: $RUNTIME.runSync($$$ARGS)
    - pattern: $RUNTIME.runSyncExit($$$ARGS)
    - pattern: $RUNTIME.runFork($$$ARGS)
    - pattern: $RUNTIME.runCallback($$$ARGS)
---
id: toon-package-belongs-to-output-codec
language: TypeScript
severity: error
message: Load @toon-format/toon only in src/output/toon.ts.
files:
  - src/**/*.ts
ignores:
  - src/output/toon.ts
rule:
  any:
    - all:
        - kind: import_statement
        - regex: '[\s\S]*["`]@toon-format/toon["`][\s\S]*'
    - pattern: import("@toon-format/toon")
    - pattern: require("@toon-format/toon")
---
id: sandcastle-factories-belong-to-workspace
language: TypeScript
severity: error
message: Load Sandcastle workspace factories only in src/validation/createValidationWorkspace.ts.
files:
  - src/**/*.ts
ignores:
  - src/validation/createValidationWorkspace.ts
rule:
  any:
    - all:
        - kind: import_statement
        - regex: '[\s\S]*(createSandbox|noSandbox)[\s\S]*from\s+["`]@ai-hero/sandcastle([^"`]*)?["`][\s\S]*'
    - all:
        - kind: import_statement
        - regex: '[\s\S]*import\s+(\*\s+as\s+|[A-Za-z_$][A-Za-z0-9_$]*\s+from\s+)[\s\S]*["`]@ai-hero/sandcastle([^"`]*)?["`][\s\S]*'
    - all:
        - kind: call_expression
        - regex: '^(import|require)\(["`]@ai-hero/sandcastle([^"`]*)?["`]\)$'
---
id: task-identity-branding-belongs-to-task-id
language: TypeScript
severity: error
message: Direct Task identity branding casts belong in src/task/taskId.ts.
files:
  - src/**/*.ts
ignores:
  - src/task/taskId.ts
rule:
  any:
    - pattern: $VALUE as PublicTaskId
    - pattern: $VALUE as TaskSlug
---
id: wall-clock-belongs-to-cli-entry
language: TypeScript
severity: error
message: Direct wall-clock reads belong in src/main.ts; other modules receive timestamps.
files:
  - src/**/*.ts
ignores:
  - src/main.ts
rule:
  any:
    - pattern: new Date()
    - pattern: Date.now()
    - pattern: new globalThis.Date()
    - pattern: globalThis.Date.now()
    - pattern: Date["now"]()
    - pattern: globalThis.Date["now"]()
